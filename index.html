<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANDAMT 4.0 — AI Trading</title>
    <style>
        :root { --gold:#C9A84C; --bg:#080808; --text:#F0EDE8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .mkt-card { background: #161616; border: 1px solid #222; padding: 20px; margin: 10px; cursor: pointer; border-radius: 10px; }
        .btn-g { background: var(--gold); color: #000; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>QANDAMT 4.0</h1>
    <p>AI-Powered Chart Analysis</p>

    <div id="p1" class="panel active">
        <h3>Choose Market:</h3>
        <div class="mkt-card" onclick="pickMarket('crypto')">🪙 Crypto (Live Bubbles)</div>
        <div class="mkt-card" onclick="pickMarket('forex')">💱 Forex (Live Heatmap)</div>
    </div>

    <div id="p2" class="panel">
        <div id="sugLoad">Scanning Market...</div>
        <div id="sugContent"></div>
        <button class="btn-g" onclick="goStep(1)">Back</button>
    </div>

    <script>
        // ⚠️ کلید خودت را که در عکس بود اینجا بگذار
        const GEMINI_API_KEY = 'AIzaSyBwjp...'; 

        function goStep(n) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
        }

        async function pickMarket(m) {
            goStep(2);
            const content = document.getElementById('sugContent');
            content.innerHTML = "Loading Live Data...";
            
            // نمایش ویجت زنده
            let widget = "";
            if(m === 'crypto') widget = `<iframe src="https://cryptobubbles.net/" style="width:100%; height:400px; border:none;"></iframe>`;
            else widget = `<iframe src="https://www.tradingview.com/embed-widget/heatmap/" style="width:100%; height:400px; border:none;"></iframe>`;
            
            content.innerHTML = widget + "<h4>AI analysis is loading based on live data...</h4>";
        }
    </script>
</body>
</html>
