<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANDAMT 4.0 | Professional Terminal</title>
    <style>
        :root { --gold: #C9A84C; --bg: #050505; --card: #0F0F0F; --text: #E0E0E0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 1px solid #222; }
        .panel { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: var(--gold); color: black; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 10px; }
        .widget-container { width: 100%; height: 500px; background: #000; border: 1px solid #333; border-radius: 15px; overflow: hidden; position: relative; }
        input { background: #111; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 5px; width: 250px; margin: 20px 0; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--gold); margin: 0;">QANDAMT 4.0</h1>
    <p>REAL-TIME MARKET ANALYSIS</p>
</header>

<div id="p1" class="panel active">
    <h2>Choose Your Market</h2>
    <button class="btn" onclick="loadMarket('crypto')">CRYPTO HEATMAP (Coin360)</button>
    <button class="btn" onclick="loadMarket('forex')">FOREX HEATMAP (TradingView)</button>
</div>

<div id="p2" class="panel">
    <div id="widget-target" class="widget-container">
        </div>
    <div style="margin-top: 20px;">
        <input type="text" id="symbolInput" placeholder="Enter Symbol (e.g. BTCUSDT)">
        <br>
        <button class="btn" onclick="goStep(3)">Confirm Asset & Next →</button>
    </div>
</div>

<div id="p3" class="panel">
    <h2 id="analysisTitle">Analysis Phase</h2>
    <p>Upload your 1H and 5M charts for the AI to process.</p>
    </div>

<script>
    // ⚠️ API KEY را اینجا قرار بده
    const API_KEY = 'YOUR_GEMINI_API_KEY';

    function goStep(n) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('p' + n).classList.add('active');
    }

    function loadMarket(type) {
        const target = document.getElementById('widget-target');
        target.innerHTML = ""; // پاکسازی قبلی

        if(type === 'crypto') {
            // ویجت رسمی Coin360
            const script = document.createElement('script');
            script.src = "https://coin360.com/static/js/widget.js";
            target.appendChild(script);
            target.innerHTML = `<div class="coin360-heatmap"><a href="https://coin360.com" target="_blank">Coin360 Heatmap</a></div>`;
            // جایگزین با آی‌فریم مستقیم اگر اسکریپت لود نشد
            target.innerHTML = `<iframe src="https://coin360.com/widget/map.html?theme=dark" width="100%" height="100%" frameborder="0"></iframe>`;
        } else {
            // ویجت رسمی هیت‌مپ فارکس TradingView
            const div = document.createElement('div');
            div.className = "tradingview-widget-container";
            div.innerHTML = `<div class="tradingview-widget-container__widget"></div>`;
            const script = document.createElement('script');
            script.type = "text/javascript";
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "width": "100%",
                "height": "100%",
                "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD"],
                "isTransparent": false,
                "colorTheme": "dark",
                "locale": "en"
            });
            target.appendChild(div);
            div.appendChild(script);
        }
        goStep(2);
    }
</script>
</body>
</html>
